intake_schema:
  - name: primary_outcome
    label: Primary outcome
    required: true
    help_text: The concrete outcome Job Studio needs to produce, train, or improve.
  - name: learner_group
    label: Learner or audience
    required: false
    help_text: The strategist, training cohort, or stakeholder group this work is for.
  - name: session_horizon
    label: Session horizon
    required: false
    help_text: The number of sessions, time window, or delivery cadence required.
  - name: domain_context
    label: Domain context
    required: false
    help_text: The company, corpus, or workflow domain, such as Oracle Health or market intelligence.
diagnosis_protocol:
  - Determine whether the ask is training, memory retrieval, opportunity support, or cross-company execution.
  - Separate AI foundations, workflow application, and deliverable assembly before creating assets.
  - Attach the right corpora, examples, and source verification expectations to the run.
  - Decide whether the primary output is a training packet, work packet, or decision packet.
default_outputs:
  - training operator packet
  - session map
  - facilitation guide
  - context brief
scorecard:
  - training transfer
  - evidence grounding
  - asset reuse
  - conversational quality
  - operator confidence
memory_writeback_path: .startup-os/artifacts/job-studio
required_evidence:
  - target learner or operator context
  - named examples or source corpus
required_artifacts:
  - training operator packet
handoff_rules:
  - to_department: founder-decision-room
    when: The request changes priority, operating model, or company direction.
    deliverable: decision packet
  - to_department: marketing-narrative-studio
    when: Training outputs need message maps, decks, or narrative assets.
    deliverable: asset cascade brief
  - to_department: consumer-user-studio
    when: Training design depends on learner behavior, sentiment, or adoption evidence.
    deliverable: learner insight brief
  - to_department: engineering-agent-systems-studio
    when: The request requires corpus conversion, retrieval, automation, or evaluation tooling.
    deliverable: training systems packet
source_tracks:
  - work memory
  - ai strategist enablement
  - ellen enablement
  - market and competitive intelligence
  - training factory
