version: 1
date: 2026-03-12
title: Startup Intelligence OS Department Ten-State Verification Matrix
data_source_categories:
  internal_memory: File-backed workspace memory, prior artifacts, and decision history.
  local_repo_assets: Local repo code, docs, studio assets, and structured OS files.
  live_web_manifests: Declared Firecrawl, Exa, Jina, or Playwright source stacks for live refresh.
  operational_metrics: Metrics, run summaries, test surfaces, or measurable operating data.
  evaluation_artifacts: Rubrics, transcript reviews, scorecards, or quality-evaluation outputs.
  benchmark_case_library: Case libraries, examples, antipattern datasets, or benchmark references.
  policy_or_compliance_sources: Policy, governance, security, legal, or accessibility reference sources.
  automation_job_proofs: Runners, monitors, or refresh jobs proving the source stack can be maintained.
capability_categories:
  structured_contracts: File-backed mission, ownership, and contract definitions.
  intake_and_diagnosis: Explicit intake schema and diagnosis protocol.
  reusable_artifacts: Named output types and reusable artifact paths.
  scorecard: Defined success criteria or scoring surface.
  memory_writeback: Explicit writeback path or memory policy.
  handoff_or_dependency_rules: Handoff, routing, or dependency rules.
  operator_visibility: Visible maturity or readiness surface for the operator.
  automation_refresh: Jobs or scripts that refresh evidence or status.
  evaluation_loop: Explicit review, rubric, or post-run improvement loop.
  decision_linking_or_stage_gates: Decision records, stage gates, or explicit approval logic.
