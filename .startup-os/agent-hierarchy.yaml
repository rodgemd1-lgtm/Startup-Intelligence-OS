# =============================================================================
# Agent Hierarchy — Startup Intelligence OS
# =============================================================================
# Source of truth for the 4-tier agent authority model.
# Design: docs/plans/2026-03-27-agent-hierarchy-design.md
# Cost routing: susan-team-architect/backend/jake_cost/router.py
#
# Budget tiers (from jake_cost/router.py):
#   LOCAL       — Ollama on M5 Max 48GB, $0, offline capable
#   FREE_BULK   — GLM-4.7-Flash via OpenRouter, free
#   VOLUME_OPS  — MiniMax M2.7 via OpenRouter, cheapest paid
#   SMART_OPS   — GLM-5 via OpenRouter, research/briefs
# =============================================================================

metadata:
  version: "1.0.0"
  approved_by: "Mike Rodgers"
  approved_date: "2026-03-28"
  status: APPROVED
  design_doc: "docs/plans/2026-03-27-agent-hierarchy-design.md"
  cost_router: "susan-team-architect/backend/jake_cost/router.py"

# =============================================================================
# Tier Definitions
# =============================================================================
tiers:
  0:
    name: Owner
    description: "Final authority on all decisions"
    authority: "Unlimited — approves all spend and strategy"
  1:
    name: Meta-Agents
    description: "Strategic decision-makers. They decide WHAT to do."
    authority: "Can approve any Tier 2 spend"
    budget_ceiling_monthly_usd: 50
  2:
    name: Super-Agents
    description: "Department leads. They decide HOW to execute."
    authority: "Can approve Tier 3 agent tasks within their department"
    budget_ceiling_monthly_usd: 15
  3:
    name: Agents
    description: "Specialists. They DO the work."
    authority: "Must request budget from super-agent"
    budget_ceiling_monthly_usd: 5
  4:
    name: Sub-Agents / Skills
    description: "Ephemeral. Spawned by agents for specific tasks. No persistent state."
    authority: "Auto-approved if parent agent has budget"
    budget_ceiling_monthly_usd: 0

