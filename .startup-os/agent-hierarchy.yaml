# =============================================================================
# Dual-Reporting Summary
# =============================================================================
# Agents with dual reporting lines:
#   shield-legal-compliance  → primary: steve (strategy), secondary: sentinel (security)
#   sentinel-health          → primary: sentinel (security), secondary: oracle-brief (oracle_health)
#   coach-exercise-science   → primary: compass (product), secondary: research-director (research)
#   sage-nutrition           → primary: compass (product), secondary: research-director (research)
#   drift-sleep-recovery     → primary: compass (product), secondary: research-director (research)
#   flow-sports-psychology   → primary: compass (product), secondary: research-director (research)

# =============================================================================
# Routing Flow
# =============================================================================
# Mike → Jake (Tier 1, front door)
#   ├─ Simple/personal → Jake handles directly
#   ├─ Needs routing → KIRA classifies intent → department lead (Tier 2)
#   │   └─ Lead delegates to specialist (Tier 3) → spawns sub-agent (Tier 4) if needed
#   └─ Needs capability design → Susan (Tier 1, foundry)

# =============================================================================
# Budget Summary
# =============================================================================
# Tier 0 (Mike):    Unlimited
# Tier 1 (Meta):    $50 + $10 + $20 = $80/mo
# Tier 2 (Super):   8 leads x $10-15 = ~$100/mo
# Tier 3 (Agent):   $0-5 each, counted against department lead budget
# Tier 4 (Sub):     $0, ephemeral, counted against parent agent
# Total ceiling:    ~$250/mo (actual spend ~$150/mo)
