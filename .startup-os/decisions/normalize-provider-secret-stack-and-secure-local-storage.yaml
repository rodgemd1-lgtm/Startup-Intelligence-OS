id: normalize-provider-secret-stack-and-secure-local-storage
title: Normalize provider key aliases and keep live secrets in ignored local storage
status: accepted
company_id: mike-job-studio
project_id: job-studio-maturity-and-training-factory
decision_statement: Use the ignored backend `.env` file as the live secret store, keep `.env.example` as the tracked template, and normalize provider alias handling in code so existing keys work without duplicating secrets across files.
why_now: The scrape, ingest, and training-factory stack depends on multiple external providers. Keys already existed locally, but several scripts expected different variable names and therefore silently missed working credentials.
constraints:
  - Do not commit live secrets into git.
  - Keep one local source of truth for active credentials.
  - Make provider health visible through a non-secret healthcheck.
options:
  - id: option-a
    name: Store secrets directly in tracked repo files
    summary: Put active keys in committed config so every script sees them.
    impact: high
    effort: low
    risk: very_high
    confidence: low
    time_to_signal: fast
  - id: option-b
    name: Use ignored local env plus tracked template and alias normalization
    summary: Keep secrets local and ignored, track only templates and health tooling, and update code to accept the real env names already in use.
    impact: high
    effort: low
    risk: low
    confidence: high
    time_to_signal: fast
recommendation: option-b
assumptions:
  - A single ignored local env file is safer than duplicating secrets across the repo.
  - The main operational problem is alias drift, not total key absence.
  - OpenAI may still require a manual dashboard pull if no local key exists.
reversal_criteria:
  - If a dedicated secret manager is introduced later, move the live source of truth out of `.env` and keep only adapters in the repo.
next_actions:
  - Keep using the provider healthcheck before major ingest or scrape runs.
  - Add the missing OpenAI key to the ignored backend env file when available.
  - Let the running Job Studio corpus ingest finish and verify stored counts afterward.
artifacts:
  - .startup-os/artifacts/provider-access-stack-2026-03-12.md
  - susan-team-architect/backend/.env.example
  - susan-team-architect/backend/scripts/provider_key_healthcheck.py
  - susan-team-architect/backend/scripts/run_enterprise_rental_multitool_scrape.py
  - susan-team-architect/backend/scripts/ingest_job_studio_training_factory.py
