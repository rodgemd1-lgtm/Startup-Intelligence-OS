id: launch-stronger-dataset-and-benchmark-enrichment-wave
title: Launch a stronger dataset and benchmark enrichment wave for Startup Intelligence OS and Job Studio
status: completed
company_id: founder-intelligence-os
project_id: job-studio-maturity-and-training-factory
decision_statement: Add stronger benchmark, evaluation, and synthetic-run review datasets through repeatable Susan manifests instead of relying only on the current department gap-closure set.
why_now: The OS now has full contract coverage, but the next maturity lift depends on stronger benchmark libraries, richer evaluation datasets, and better synthetic-run review material for Susan's routed agents and Job Studio training work.
constraints:
  - Prefer official docs, official repos, stable public reports, and durable handbook sources.
  - Keep founder-intelligence-os and mike-job-studio corpora separated by company_id.
  - Use repeatable manifests and runners so Susan's research agent can refresh the stack.
options:
  - id: option-a
    name: Keep using current manifests only
    summary: Rely on the existing department and training manifests without adding a stronger benchmark/eval wave.
    impact: medium
    effort: low
    risk: high
    confidence: medium
    time_to_signal: slow
  - id: option-b
    name: Add stronger benchmark and eval dataset wave
    summary: Build a targeted source stack for benchmark cases, synthetic evaluation, and adult-learning evidence, then ingest it into Susan's knowledge base.
    impact: very_high
    effort: medium
    risk: low
    confidence: high
    time_to_signal: fast
recommendation: option-b
assumptions:
  - Stronger benchmark and evaluation data will raise simulated maturity faster than adding more wrappers.
  - OpenAI, NIST, GitLab, SaaS benchmark reports, and adult-learning sources are strong enough to improve the benchmark library immediately.
  - Synthetic run reviews and eval test packs should be first-class proof objects in the benchmark layer.
reversal_criteria:
  - If the stronger source stack produces noisy or low-signal chunks, narrow the manifests to the best-performing sources and lower breadth.
  - If the new data improves counts but not output quality, raise the threshold for what counts as benchmark-quality evidence.
next_actions:
  - Promote the best-performing sources into maintained department benchmark libraries.
  - Attach the new `studio_evals` corpus to synthetic-run review and Monte Carlo harnesses.
  - Use the new learning-science layer to improve Track C and training facilitator-review loops.
  - Extend the stronger dataset wave with more official benchmark providers only if output quality keeps improving.
