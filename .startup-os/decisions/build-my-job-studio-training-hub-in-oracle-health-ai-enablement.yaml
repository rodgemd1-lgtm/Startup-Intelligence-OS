  - /Users/mikerodgers/AI-Enablement-Oracle-Chat/my-job-studio/MY_JOB_STUDIO_ACCESS_PROMPT.md
  - /Users/mikerodgers/AI-Enablement-Oracle-Chat/training-site/index.html
  - /Users/mikerodgers/AI-Enablement-Oracle-Chat/training-site/app.js
  - /Users/mikerodgers/AI-Enablement-Oracle-Chat/training-site/styles.css
