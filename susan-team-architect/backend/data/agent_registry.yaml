    agents: ["steve", "shield", "bridge", "ledger", "vault", "recruiting-strategy-studio"]
  product:
    description: "Product design, emotional experience, accessibility, neuroscience"
    agents: ["marcus", "mira", "lens", "echo", "compass", "prism", "ai-product-manager", "conversation-designer"]
  engineering:
    description: "Engineering, AI/ML, data science, security"
