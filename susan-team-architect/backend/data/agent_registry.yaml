  science:
    description: "Exercise science, nutrition, sleep/recovery"
    agents: ["coach", "sage", "drift", "workout-program-studio", "coaching-architecture-studio"]
  psychology:
    description: "Behavioral economics, sports psychology, gamification"
    agents: ["freya", "flow", "quest"]
  growth:
    description: "Growth marketing, community, customer success, PR"
    agents: ["aria", "haven", "guide", "herald", "beacon", "coach-outreach-studio"]
  research:
    description: "Research direction, operations, and evidence acquisition"
