      - "Sit with knees bent, lean back ~45 degrees, feet off floor"
      - "Rotate torso side to side, touching hands to the floor"
      - "Keep chest lifted and core engaged throughout"
    contraindications:
      - "Lower back pain with rotation"
      - "Disc herniation"
    progressions:
      easier: ["Feet on floor, no weight"]
      harder: ["Weighted Russian Twist", "Cable Rotation"]

  # ============================================================
  # CARDIO / CONDITIONING
  # ============================================================

  - name: "Treadmill Running"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["quadriceps", "hamstrings", "calves"]
      secondary: ["gluteus_maximus", "core", "hip_flexors"]
    equipment: "machine"
    difficulty: "beginner"
    coaching_cues:
      - "Land midfoot, avoid heel-striking at speed"
      - "Keep cadence around 170-180 steps per minute"
      - "Maintain upright posture — avoid leaning on handles"
    contraindications:
      - "Acute knee or ankle injury"
      - "Stress fractures"
    progressions:
      easier: ["Walking"]
      harder: ["Incline Running", "Interval Sprints"]

  - name: "Rowing Machine (Erg)"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["quadriceps", "latissimus_dorsi", "hamstrings"]
      secondary: ["biceps", "core", "calves"]
    equipment: "machine"
    difficulty: "beginner"
    coaching_cues:
      - "Drive with legs first, then lean back, then pull arms"
      - "Return arms first, then body, then legs (reverse sequence)"
      - "Maintain a long, powerful stroke — not short and choppy"
    contraindications:
      - "Acute lower back pain"
      - "Knee pain during deep flexion"
    progressions:
      easier: ["Shorter intervals at lower intensity"]
      harder: ["Interval training (500m repeats)", "Longer steady-state rows"]

  - name: "Assault Bike / Air Bike"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["quadriceps", "hamstrings"]
      secondary: ["shoulders", "core", "triceps", "biceps"]
    equipment: "machine"
    difficulty: "beginner"
    coaching_cues:
      - "Push and pull with arms while pedaling"
      - "Maintain an upright torso"
      - "For intervals: go all-out for work periods, recover actively"
    contraindications:
      - "Acute shoulder or knee injury"
    progressions:
      easier: ["Steady-state cycling"]
      harder: ["Tabata intervals (20s on / 10s off)"]

  - name: "Jump Rope"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["calves", "quadriceps"]
      secondary: ["shoulders", "forearms", "core"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Jump just high enough to clear the rope (1-2 inches)"
      - "Spin the rope with wrists, not shoulders"
      - "Stay on balls of feet, soft knees"
    contraindications:
      - "Acute ankle or knee injury"
      - "Stress fractures"
    progressions:
      easier: ["No-rope jumping in place"]
      harder: ["Double-Unders", "Crossovers"]

  - name: "Battle Ropes"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["shoulders", "core"]
      secondary: ["biceps", "forearms", "legs"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Athletic stance, slight squat position"
      - "Alternate arms in a wave motion from the shoulders"
      - "Keep waves moving all the way to the anchor point"
    contraindications:
      - "Acute shoulder injury"
      - "Rotator cuff pain with repetitive overhead motion"
    progressions:
      easier: ["Shorter intervals, lighter rope"]
      harder: ["Longer intervals", "Slam variations"]

  - name: "Burpee"
    movement_pattern: "cardio"
    category: "plyometric"
    muscle_groups:
      primary: ["quadriceps", "pectoralis_major", "shoulders"]
      secondary: ["core", "triceps", "hip_flexors"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Drop to push-up position with hands on floor"
      - "Perform a push-up, then jump feet to hands"
      - "Jump up explosively, reaching arms overhead"
    contraindications:
      - "Acute wrist, shoulder, or knee injury"
      - "High blood pressure (consult physician)"
    progressions:
      easier: ["Step-Back Burpee (no jump)"]
      harder: ["Burpee Box Jump", "Burpee Pull-Up"]

  - name: "Sled Push"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus", "calves"]
      secondary: ["core", "shoulders", "hamstrings"]
    equipment: "machine"
    difficulty: "intermediate"
    coaching_cues:
      - "Grip handles with arms extended, lean into the sled"
      - "Drive through the legs with powerful steps"
      - "Keep hips low and torso at ~45 degrees"
    contraindications:
      - "Acute shoulder or knee injury"
      - "Uncontrolled hypertension"
    progressions:
      easier: ["Lighter load, shorter distance"]
      harder: ["Heavy sled push", "Sprint sled push"]

  - name: "Stair Climber"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus", "calves"]
      secondary: ["hamstrings", "core"]
    equipment: "machine"
    difficulty: "beginner"
    coaching_cues:
      - "Stand tall — avoid leaning heavily on the handles"
      - "Drive through the whole foot each step"
      - "Maintain a steady cadence for the target duration"
    contraindications:
      - "Acute knee pain"
      - "Balance disorders (use handles for support)"
    progressions:
      easier: ["Slower speed"]
      harder: ["Faster speed", "Skip-step pattern"]

  - name: "Box Jump"
    movement_pattern: "cardio"
    category: "plyometric"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus", "calves"]
      secondary: ["hamstrings", "core"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Stand facing box, swing arms back then explosively jump"
      - "Land softly with both feet fully on the box"
      - "Step down — do not jump down to save joint stress"
    contraindications:
      - "Acute knee or ankle injury"
      - "Achilles tendinopathy"
    progressions:
      easier: ["Box Step-Up", "Lower box"]
      harder: ["Higher box", "Weighted Box Jump"]

  - name: "Kettlebell Snatch"
    movement_pattern: "cardio"
    category: "compound"
    muscle_groups:
      primary: ["gluteus_maximus", "hamstrings", "shoulders"]
      secondary: ["core", "trapezius", "forearms"]
    equipment: "kettlebell"
    difficulty: "advanced"
    coaching_cues:
      - "Start with a kettlebell swing, guide the bell overhead in one motion"
      - "Punch through at the top to avoid wrist bang"
      - "Control the drop back between the legs"
    contraindications:
      - "Shoulder instability or impingement"
      - "Poor hip hinge mechanics"
    progressions:
      easier: ["Kettlebell Swing", "Kettlebell Clean"]
      harder: ["Alternating Kettlebell Snatch", "Double Kettlebell Snatch"]

  - name: "Mountain Climbers"
    movement_pattern: "cardio"
    category: "cardio"
    muscle_groups:
      primary: ["hip_flexors", "core"]
      secondary: ["quadriceps", "shoulders", "calves"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Start in push-up position, body straight"
      - "Drive knees toward chest alternately at speed"
      - "Keep hips level — do not pike up"
    contraindications:
      - "Acute wrist or shoulder injury"
      - "Acute hip flexor strain"
    progressions:
      easier: ["Slow mountain climbers"]
      harder: ["Cross-body mountain climbers", "Spider-Man mountain climbers"]

  # ============================================================
  # FLEXIBILITY / MOBILITY
  # ============================================================

  - name: "Standing Hamstring Stretch"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["hamstrings"]
      secondary: ["calves", "lower_back"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Place one heel on a low surface, keep both legs straight"
      - "Hinge forward at the hips, reaching toward the foot"
      - "Hold for 30 seconds — breathe into the stretch"
    contraindications:
      - "Acute hamstring tear (wait for clearance)"
    progressions:
      easier: ["Supine hamstring stretch with strap"]
      harder: ["Standing forward fold (both legs)"]

  - name: "Hip Flexor Stretch (Half-Kneeling)"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["hip_flexors", "psoas"]
      secondary: ["quadriceps", "rectus_femoris"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Kneel on one knee, front foot flat, 90-degree angle"
      - "Tuck pelvis under (posterior tilt) and shift weight forward"
      - "Hold 30 seconds — should feel stretch in the front of the rear hip"
    contraindications:
      - "Knee pain in kneeling position (use padding)"
    progressions:
      easier: ["Standing hip flexor stretch"]
      harder: ["Add overhead reach", "Add lateral lean"]

  - name: "Pigeon Pose"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["gluteus_maximus", "piriformis", "external_hip_rotators"]
      secondary: ["hip_flexors"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Front shin across the body, back leg extended behind"
      - "Square the hips and fold forward over the front shin"
      - "Hold for 60-90 seconds per side"
    contraindications:
      - "Knee pain in flexed/rotated position"
      - "Acute hip injury"
    progressions:
      easier: ["Figure-4 stretch (supine)"]
      harder: ["King Pigeon Pose"]

  - name: "Cat-Cow"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["erector_spinae", "rectus_abdominis"]
      secondary: ["hip_flexors", "neck_extensors"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Hands and knees, wrists under shoulders, knees under hips"
      - "Arch back upward (cat), then drop belly toward floor (cow)"
      - "Move slowly with breath — inhale cow, exhale cat"
    contraindications:
      - "Acute wrist pain in weight-bearing"
    progressions:
      easier: ["Seated spinal flexion/extension"]
      harder: ["Add pause at each end range"]

  - name: "World's Greatest Stretch"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["hip_flexors", "thoracic_spine", "hamstrings"]
      secondary: ["adductors", "quadriceps", "shoulders"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Lunge forward, place both hands inside the front foot"
      - "Rotate one arm toward the ceiling, opening the chest"
      - "Hold the rotation, then switch to the other side"
    contraindications:
      - "Acute groin or hip flexor strain"
    progressions:
      easier: ["Perform from half-kneeling"]
      harder: ["Add straight leg and hamstring reach"]

  - name: "Thoracic Spine Rotation"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["thoracic_spine_rotators"]
      secondary: ["obliques", "intercostals"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Side-lying with knees stacked at 90 degrees"
      - "Open top arm across the body, rotating through mid-back"
      - "Follow the hand with your eyes, hold 2-3 seconds"
    contraindications:
      - "Acute rib or thoracic spine injury"
    progressions:
      easier: ["Seated trunk rotation"]
      harder: ["Add resistance band"]

  - name: "Couch Stretch"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["quadriceps", "hip_flexors"]
      secondary: ["rectus_femoris", "psoas"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Rear foot up against wall or couch, front foot flat on floor"
      - "Keep torso upright, tuck pelvis under"
      - "Hold for 60-90 seconds per side"
    contraindications:
      - "Acute knee injury"
      - "Patellar tendinopathy"
    progressions:
      easier: ["Standing quad stretch"]
      harder: ["Hands-free couch stretch"]

  - name: "90/90 Hip Stretch"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["hip_external_rotators", "hip_internal_rotators"]
      secondary: ["gluteus_medius", "piriformis"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Sit with both knees bent at 90 degrees in opposite directions"
      - "Sit tall, lean forward over the front shin"
      - "Hold 30-60 seconds, then switch sides"
    contraindications:
      - "Knee pain in this position"
      - "Hip labral tear"
    progressions:
      easier: ["Figure-4 stretch (supine)"]
      harder: ["Lean forward deeper", "Lift back knee"]

  - name: "Shoulder Pass-Through"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["shoulder_flexors", "shoulder_extensors"]
      secondary: ["pectoralis_major", "latissimus_dorsi"]
    equipment: "band"
    difficulty: "beginner"
    coaching_cues:
      - "Hold a dowel or band with a wide grip"
      - "Raise arms overhead and behind your back in a full arc"
      - "Gradually narrow grip as mobility improves"
    contraindications:
      - "Shoulder impingement with pain in overhead arc"
      - "Shoulder dislocation history (proceed cautiously)"
    progressions:
      easier: ["Wider grip"]
      harder: ["Narrower grip"]

  - name: "Foam Rolling — IT Band & Quads"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["quadriceps", "iliotibial_band"]
      secondary: ["hip_flexors", "vastus_lateralis"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Lie on foam roller, roll from hip to just above the knee"
      - "Pause on tender spots for 20-30 seconds"
      - "Use arms to control pressure and body weight"
    contraindications:
      - "Acute bruising or contusion"
      - "Varicose veins in the area"
    progressions:
      easier: ["Softer roller, less body weight"]
      harder: ["Firmer roller, longer pauses"]

  - name: "Child's Pose"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["latissimus_dorsi", "erector_spinae"]
      secondary: ["shoulders", "hip_flexors"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Kneel and sit back onto heels, arms extended forward on floor"
      - "Walk hands forward to deepen the stretch"
      - "Breathe deeply, hold for 30-60 seconds"
    contraindications:
      - "Knee pain in deep flexion"
    progressions:
      easier: ["Standing lat stretch against wall"]
      harder: ["Thread-the-Needle variation"]

  - name: "Ankle Dorsiflexion Mobilization"
    movement_pattern: "flexibility"
    category: "flexibility"
    muscle_groups:
      primary: ["gastrocnemius", "soleus", "ankle_joint"]
      secondary: ["tibialis_anterior"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Half-kneeling facing a wall, front foot ~4 inches from wall"
      - "Drive front knee toward the wall over the toes"
      - "Keep heel on the floor throughout"
    contraindications:
      - "Acute ankle sprain"
      - "Ankle fracture (post-clearance only)"
    progressions:
      easier: ["Closer to wall"]
      harder: ["Further from wall", "Add band distraction"]

  # ============================================================
  # BICEPS / TRICEPS (Supplemental Isolation)
  # ============================================================

  - name: "Barbell Curl"
    movement_pattern: "pull_horizontal"
    category: "isolation"
    muscle_groups:
      primary: ["biceps"]
      secondary: ["brachialis", "forearms"]
    equipment: "barbell"
    difficulty: "beginner"
    coaching_cues:
      - "Elbows pinned at your sides, grip shoulder-width"
      - "Curl bar to shoulder height without swinging"
      - "Lower with control — full extension each rep"
    contraindications:
      - "Bicep tendon injury"
      - "Medial epicondylitis"
    progressions:
      easier: ["Dumbbell Curl"]
      harder: ["Strict Barbell Curl (wall-supported)"]

  - name: "Dumbbell Hammer Curl"
    movement_pattern: "pull_horizontal"
    category: "isolation"
    muscle_groups:
      primary: ["brachialis", "brachioradialis"]
      secondary: ["biceps", "forearms"]
    equipment: "dumbbell"
    difficulty: "beginner"
    coaching_cues:
      - "Hold dumbbells with neutral grip (palms facing each other)"
      - "Curl while maintaining the neutral wrist position"
      - "Lower under control to full extension"
    contraindications:
      - "Lateral epicondylitis"
    progressions:
      easier: ["Lighter dumbbells"]
      harder: ["Cross-Body Hammer Curl", "Incline Hammer Curl"]

  - name: "Tricep Dip"
    movement_pattern: "push_vertical"
    category: "compound"
    muscle_groups:
      primary: ["triceps"]
      secondary: ["anterior_deltoid", "pectoralis_major"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Grip parallel bars, arms straight, torso upright"
      - "Lower until upper arms are parallel to floor"
      - "Press up to full lockout"
    contraindications:
      - "Shoulder instability or impingement"
      - "Sternoclavicular joint pain"
    progressions:
      easier: ["Bench Dip", "Machine Assisted Dip"]
      harder: ["Weighted Dip", "Ring Dip"]

  - name: "Cable Tricep Pushdown"
    movement_pattern: "push_vertical"
    category: "isolation"
    muscle_groups:
      primary: ["triceps"]
      secondary: []
    equipment: "cable"
    difficulty: "beginner"
    coaching_cues:
      - "Elbows at sides, push handle down to full extension"
      - "Squeeze triceps at the bottom"
      - "Control the return — do not let the weight jerk up"
    contraindications:
      - "Tricep tendinopathy"
      - "Elbow pain"
    progressions:
      easier: ["Lighter resistance"]
      harder: ["Single-Arm Pushdown", "Overhead Tricep Extension"]

  - name: "Overhead Tricep Extension"
    movement_pattern: "push_vertical"
    category: "isolation"
    muscle_groups:
      primary: ["triceps"]
      secondary: []
    equipment: "dumbbell"
    difficulty: "beginner"
    coaching_cues:
      - "Hold one dumbbell overhead with both hands"
      - "Lower behind your head by bending at the elbows"
      - "Extend arms fully, squeezing triceps at the top"
    contraindications:
      - "Shoulder impingement with overhead motion"
      - "Elbow pain"
    progressions:
      easier: ["Cable Pushdown"]
      harder: ["Single-Arm Overhead Extension"]

