# Exercise Database — Coach Knowledge Base
# ~100 exercises organized by movement pattern
# Categories: compound, isolation, cardio, flexibility, plyometric
# Equipment: bodyweight, barbell, dumbbell, cable, machine, band, kettlebell
# Difficulty: beginner, intermediate, advanced
#
# This file is the primary exercise science reference for Coach.
# Sources: NSCA Essentials, ACSM Guidelines, ACE Exercise Library

exercises:

  # ============================================================
  # PUSH — Horizontal
  # ============================================================

  - name: "Push-Up"
    movement_pattern: "push_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["pectoralis_major", "anterior_deltoid", "triceps"]
      secondary: ["serratus_anterior", "core"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Hands slightly wider than shoulders, fingers spread"
      - "Body forms a straight line from head to heels"
      - "Lower chest to just above the floor, elbows at ~45 degrees"
    contraindications:
      - "Acute wrist injury"
      - "Shoulder impingement with pain during horizontal pressing"
    progressions:
      easier: ["Incline Push-Up", "Knee Push-Up"]
      harder: ["Decline Push-Up", "Archer Push-Up"]

  - name: "Barbell Bench Press"
    movement_pattern: "push_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["pectoralis_major", "anterior_deltoid", "triceps"]
      secondary: ["serratus_anterior", "core"]
    equipment: "barbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Retract and depress scapulae — squeeze shoulder blades together"
      - "Lower bar to mid-chest with controlled tempo"
      - "Drive feet into the floor to maintain arch and stability"
    contraindications:
      - "Acute shoulder injury or instability"
      - "Unmanaged shoulder impingement"
    progressions:
      easier: ["Dumbbell Bench Press", "Push-Up"]
      harder: ["Paused Bench Press", "Close-Grip Bench Press"]

  - name: "Dumbbell Bench Press"
    movement_pattern: "push_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["pectoralis_major", "anterior_deltoid", "triceps"]
      secondary: ["serratus_anterior", "rotator_cuff"]
    equipment: "dumbbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Start with dumbbells at chest height, palms facing forward"
      - "Press up and slightly inward without locking elbows"
      - "Lower with control, feeling a stretch at the bottom"
    contraindications:
      - "Acute shoulder instability"
      - "Inability to stabilize dumbbells overhead"
    progressions:
      easier: ["Machine Chest Press", "Push-Up"]
      harder: ["Single-Arm Dumbbell Bench Press", "Barbell Bench Press"]

  - name: "Machine Chest Press"
    movement_pattern: "push_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["pectoralis_major", "anterior_deltoid", "triceps"]
      secondary: ["serratus_anterior"]
    equipment: "machine"
    difficulty: "beginner"
    coaching_cues:
      - "Adjust seat so handles are at mid-chest height"
      - "Keep back flat against pad, feet flat on floor"
      - "Press forward to full extension without locking elbows"
    contraindications:
      - "Acute shoulder pain during pressing"
    progressions:
      easier: ["Wall Push-Up"]
      harder: ["Dumbbell Bench Press", "Barbell Bench Press"]

  - name: "Cable Chest Fly"
    movement_pattern: "push_horizontal"
    category: "isolation"
    muscle_groups:
      primary: ["pectoralis_major"]
      secondary: ["anterior_deltoid", "biceps"]
    equipment: "cable"
    difficulty: "intermediate"
    coaching_cues:
      - "Set cables at chest height, step forward into a staggered stance"
      - "Maintain a slight bend in the elbows throughout"
      - "Squeeze chest at the midline, control the return"
    contraindications:
      - "Shoulder instability"
      - "Pec strain or tear history"
    progressions:
      easier: ["Machine Pec Fly"]
      harder: ["Single-Arm Cable Fly"]

  - name: "Dumbbell Chest Fly"
    movement_pattern: "push_horizontal"
    category: "isolation"
    muscle_groups:
      primary: ["pectoralis_major"]
      secondary: ["anterior_deltoid", "biceps"]
    equipment: "dumbbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Lie flat with a slight elbow bend, palms facing each other"
      - "Lower dumbbells in a wide arc until you feel a chest stretch"
      - "Squeeze chest to bring dumbbells together overhead"
    contraindications:
      - "Shoulder instability"
      - "Acute pectoralis strain"
    progressions:
      easier: ["Machine Pec Fly"]
      harder: ["Cable Chest Fly", "Single-Arm Dumbbell Fly"]

  # ============================================================
  # PUSH — Vertical
  # ============================================================

  - name: "Overhead Press (Barbell)"
    movement_pattern: "push_vertical"
    category: "compound"
    muscle_groups:
      primary: ["anterior_deltoid", "medial_deltoid", "triceps"]
      secondary: ["upper_trapezius", "core", "serratus_anterior"]
    equipment: "barbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Bar starts at collarbone, grip slightly wider than shoulders"
      - "Brace core and press bar straight overhead"
      - "Push head through once bar clears forehead"
    contraindications:
      - "Shoulder impingement with overhead pain"
      - "Lumbar disc issues aggravated by standing overhead load"
    progressions:
      easier: ["Seated Dumbbell Press", "Landmine Press"]
      harder: ["Push Press", "Behind-the-Neck Press"]

  - name: "Dumbbell Shoulder Press"
    movement_pattern: "push_vertical"
    category: "compound"
    muscle_groups:
      primary: ["anterior_deltoid", "medial_deltoid", "triceps"]
      secondary: ["upper_trapezius", "serratus_anterior"]
    equipment: "dumbbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Start with dumbbells at shoulder height, palms forward"
      - "Press straight up without arching the lower back"
      - "Lower under control to ear level"
    contraindications:
      - "Active shoulder impingement"
      - "Cervical spine issues"
    progressions:
      easier: ["Machine Shoulder Press", "Landmine Press"]
      harder: ["Arnold Press", "Single-Arm Dumbbell Press"]

  - name: "Arnold Press"
    movement_pattern: "push_vertical"
    category: "compound"
    muscle_groups:
      primary: ["anterior_deltoid", "medial_deltoid", "triceps"]
      secondary: ["upper_trapezius", "rotator_cuff"]
    equipment: "dumbbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Start with palms facing you at chest height"
      - "Rotate palms forward as you press overhead"
      - "Reverse the rotation on the way down"
    contraindications:
      - "Shoulder impingement"
      - "Rotator cuff pathology"
    progressions:
      easier: ["Dumbbell Shoulder Press"]
      harder: ["Single-Arm Arnold Press"]

  - name: "Landmine Press"
    movement_pattern: "push_vertical"
    category: "compound"
    muscle_groups:
      primary: ["anterior_deltoid", "upper_pectoralis", "triceps"]
      secondary: ["serratus_anterior", "core"]
    equipment: "barbell"
    difficulty: "beginner"
    coaching_cues:
      - "Hold end of barbell at shoulder height with one or both hands"
      - "Press at a ~45-degree angle, extending fully"
      - "Brace core to prevent rotation"
    contraindications:
      - "Acute shoulder pain"
    progressions:
      easier: ["Machine Shoulder Press"]
      harder: ["Half-Kneeling Landmine Press", "Overhead Press"]

  - name: "Pike Push-Up"
    movement_pattern: "push_vertical"
    category: "compound"
    muscle_groups:
      primary: ["anterior_deltoid", "medial_deltoid", "triceps"]
      secondary: ["upper_trapezius", "core"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Form an inverted V with hips high"
      - "Lower the top of your head toward the floor"
      - "Press back up to full extension"
    contraindications:
      - "Shoulder impingement"
      - "Uncontrolled hypertension (inverted position)"
    progressions:
      easier: ["Incline Push-Up"]
      harder: ["Handstand Push-Up", "Deficit Pike Push-Up"]

  - name: "Dumbbell Lateral Raise"
    movement_pattern: "push_vertical"
    category: "isolation"
    muscle_groups:
      primary: ["medial_deltoid"]
      secondary: ["upper_trapezius", "supraspinatus"]
    equipment: "dumbbell"
    difficulty: "beginner"
    coaching_cues:
      - "Slight bend in elbows, raise arms to shoulder height"
      - "Lead with the elbows, not the hands"
      - "Control the descent — do not swing"
    contraindications:
      - "Shoulder impingement or supraspinatus tendinopathy"
    progressions:
      easier: ["Cable Lateral Raise"]
      harder: ["Leaning Lateral Raise", "Pause-at-Top Lateral Raise"]

  - name: "Incline Dumbbell Press"
    movement_pattern: "push_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["upper_pectoralis", "anterior_deltoid", "triceps"]
      secondary: ["serratus_anterior"]
    equipment: "dumbbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Set bench to 30-45 degrees, dumbbells at chest level"
      - "Press up and slightly inward"
      - "Lower under control to upper chest level"
    contraindications:
      - "Shoulder impingement"
      - "Acute anterior deltoid strain"
    progressions:
      easier: ["Machine Incline Press"]
      harder: ["Barbell Incline Press"]

  - name: "Decline Push-Up"
    movement_pattern: "push_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["pectoralis_major", "anterior_deltoid", "triceps"]
      secondary: ["core", "serratus_anterior"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Feet elevated on a bench, hands on floor"
      - "Lower chest toward floor, keeping body straight"
      - "Press back up to full extension"
    contraindications:
      - "Shoulder pain with overhead-angle pressing"
      - "Wrist injury"
    progressions:
      easier: ["Standard Push-Up"]
      harder: ["Decline Diamond Push-Up"]

  - name: "Machine Shoulder Press"
    movement_pattern: "push_vertical"
    category: "compound"
    muscle_groups:
      primary: ["anterior_deltoid", "medial_deltoid", "triceps"]
      secondary: ["upper_trapezius"]
    equipment: "machine"
    difficulty: "beginner"
    coaching_cues:
      - "Adjust seat so handles are at shoulder height"
      - "Press overhead to full extension without locking"
      - "Lower with control to the starting position"
    contraindications:
      - "Shoulder impingement with overhead motion"
    progressions:
      easier: ["Lighter load"]
      harder: ["Dumbbell Shoulder Press"]

  # ============================================================
  # PULL — Horizontal
  # ============================================================

  - name: "Barbell Bent-Over Row"
    movement_pattern: "pull_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "rhomboids", "middle_trapezius"]
      secondary: ["biceps", "posterior_deltoid", "erector_spinae"]
    equipment: "barbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Hinge at the hips to ~45 degrees, flat back"
      - "Pull bar to lower chest / upper abdomen"
      - "Squeeze shoulder blades together at the top"
    contraindications:
      - "Acute lower back injury"
      - "Herniated disc with flexion intolerance"
    progressions:
      easier: ["Cable Row", "Dumbbell Row"]
      harder: ["Pendlay Row", "Barbell Seal Row"]

  - name: "Dumbbell Single-Arm Row"
    movement_pattern: "pull_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "rhomboids", "middle_trapezius"]
      secondary: ["biceps", "posterior_deltoid"]
    equipment: "dumbbell"
    difficulty: "beginner"
    coaching_cues:
      - "One hand and knee on bench, back flat and parallel to floor"
      - "Pull dumbbell to hip, driving elbow toward ceiling"
      - "Avoid rotating the torso — keep hips square"
    contraindications:
      - "Acute shoulder pain during rowing motion"
    progressions:
      easier: ["Machine Row"]
      harder: ["Barbell Bent-Over Row", "Kroc Row"]

  - name: "Seated Cable Row"
    movement_pattern: "pull_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "rhomboids", "middle_trapezius"]
      secondary: ["biceps", "posterior_deltoid", "erector_spinae"]
    equipment: "cable"
    difficulty: "beginner"
    coaching_cues:
      - "Sit tall with slight knee bend, chest up"
      - "Pull handle to lower chest, squeezing shoulder blades"
      - "Control the return — do not let the weight pull you forward"
    contraindications:
      - "Acute lower back pain during seated position"
    progressions:
      easier: ["Machine Row"]
      harder: ["Single-Arm Cable Row", "Barbell Bent-Over Row"]

  - name: "Chest-Supported Dumbbell Row"
    movement_pattern: "pull_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "rhomboids", "middle_trapezius"]
      secondary: ["biceps", "posterior_deltoid"]
    equipment: "dumbbell"
    difficulty: "beginner"
    coaching_cues:
      - "Lie face down on an incline bench set to 30-45 degrees"
      - "Row dumbbells toward hips, squeezing shoulder blades"
      - "Lower with control, fully extending at the bottom"
    contraindications:
      - "Rib or sternum discomfort from bench pressure"
    progressions:
      easier: ["Machine Row"]
      harder: ["Barbell Bent-Over Row"]

  - name: "Face Pull"
    movement_pattern: "pull_horizontal"
    category: "isolation"
    muscle_groups:
      primary: ["posterior_deltoid", "rhomboids", "external_rotators"]
      secondary: ["middle_trapezius", "infraspinatus"]
    equipment: "cable"
    difficulty: "beginner"
    coaching_cues:
      - "Set cable at face height, use rope attachment"
      - "Pull toward face, separating hands at the end"
      - "Squeeze shoulder blades and externally rotate at the finish"
    contraindications:
      - "Acute rotator cuff injury"
    progressions:
      easier: ["Band Pull-Apart"]
      harder: ["Single-Arm Face Pull"]

  - name: "Band Pull-Apart"
    movement_pattern: "pull_horizontal"
    category: "isolation"
    muscle_groups:
      primary: ["posterior_deltoid", "rhomboids"]
      secondary: ["middle_trapezius", "infraspinatus"]
    equipment: "band"
    difficulty: "beginner"
    coaching_cues:
      - "Hold band at shoulder height with straight arms"
      - "Pull band apart by squeezing shoulder blades"
      - "Pause at full contraction, return slowly"
    contraindications:
      - "Acute shoulder pain during horizontal abduction"
    progressions:
      easier: ["Lighter band"]
      harder: ["Face Pull", "Heavier band with pause"]

  - name: "T-Bar Row"
    movement_pattern: "pull_horizontal"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "rhomboids", "middle_trapezius"]
      secondary: ["biceps", "erector_spinae", "posterior_deltoid"]
    equipment: "barbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Straddle the bar, grip the handle with both hands"
      - "Hinge at the hips, pull bar toward chest"
      - "Squeeze shoulder blades at the top, lower with control"
    contraindications:
      - "Acute lower back injury"
      - "Herniated disc with flexion intolerance"
    progressions:
      easier: ["Seated Cable Row"]
      harder: ["Barbell Bent-Over Row"]

  - name: "Rear Delt Fly (Dumbbell)"
    movement_pattern: "pull_horizontal"
    category: "isolation"
    muscle_groups:
      primary: ["posterior_deltoid"]
      secondary: ["rhomboids", "middle_trapezius"]
    equipment: "dumbbell"
    difficulty: "beginner"
    coaching_cues:
      - "Hinge forward at hips, dumbbells hanging below"
      - "Raise arms out to the sides with a slight elbow bend"
      - "Squeeze shoulder blades at the top, lower slowly"
    contraindications:
      - "Acute posterior shoulder pain"
    progressions:
      easier: ["Machine Rear Delt Fly"]
      harder: ["Cable Rear Delt Fly"]

  # ============================================================
  # PULL — Vertical
  # ============================================================

  - name: "Pull-Up"
    movement_pattern: "pull_vertical"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "biceps", "brachialis"]
      secondary: ["rhomboids", "lower_trapezius", "forearms"]
    equipment: "bodyweight"
    difficulty: "advanced"
    coaching_cues:
      - "Grip bar slightly wider than shoulders, dead hang start"
      - "Pull elbows down and back — drive chest toward bar"
      - "Lower with control to full extension each rep"
    contraindications:
      - "Shoulder impingement with overhead pain"
      - "Elbow tendinopathy aggravated by gripping"
    progressions:
      easier: ["Assisted Pull-Up", "Lat Pulldown"]
      harder: ["Weighted Pull-Up", "Muscle-Up"]

  - name: "Chin-Up"
    movement_pattern: "pull_vertical"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "biceps"]
      secondary: ["brachialis", "lower_trapezius", "forearms"]
    equipment: "bodyweight"
    difficulty: "intermediate"
    coaching_cues:
      - "Supinated grip (palms facing you), shoulder-width apart"
      - "Pull chin above bar, squeezing biceps at the top"
      - "Lower under control to full arm extension"
    contraindications:
      - "Medial epicondylitis (golfer's elbow)"
      - "Shoulder instability"
    progressions:
      easier: ["Assisted Chin-Up", "Lat Pulldown (supinated)"]
      harder: ["Weighted Chin-Up", "Pull-Up"]

  - name: "Lat Pulldown"
    movement_pattern: "pull_vertical"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "biceps"]
      secondary: ["rhomboids", "lower_trapezius", "forearms"]
    equipment: "cable"
    difficulty: "beginner"
    coaching_cues:
      - "Grip bar wider than shoulders, sit with thighs secured"
      - "Pull bar to upper chest, leaning back slightly"
      - "Control the return — do not let the weight jerk arms up"
    contraindications:
      - "Shoulder pain during overhead pulling"
    progressions:
      easier: ["Machine Assisted Pulldown"]
      harder: ["Close-Grip Pulldown", "Pull-Up"]

  - name: "Straight-Arm Pulldown"
    movement_pattern: "pull_vertical"
    category: "isolation"
    muscle_groups:
      primary: ["latissimus_dorsi"]
      secondary: ["teres_major", "long_head_triceps", "posterior_deltoid"]
    equipment: "cable"
    difficulty: "intermediate"
    coaching_cues:
      - "Stand facing cable, arms extended overhead with slight bend"
      - "Pull bar down to thighs in an arc, keeping arms straight"
      - "Squeeze lats at the bottom, return slowly"
    contraindications:
      - "Shoulder pain with arm extension under load"
    progressions:
      easier: ["Lat Pulldown"]
      harder: ["Single-Arm Straight-Arm Pulldown"]

  - name: "Inverted Row"
    movement_pattern: "pull_vertical"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "rhomboids", "middle_trapezius"]
      secondary: ["biceps", "posterior_deltoid", "core"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Hang underneath a bar at hip height, body straight"
      - "Pull chest to bar, squeezing shoulder blades"
      - "Lower with control to full arm extension"
    contraindications:
      - "Acute shoulder injury"
    progressions:
      easier: ["Higher bar angle (more upright)"]
      harder: ["Feet-elevated Inverted Row", "Weighted Inverted Row"]

  - name: "Close-Grip Lat Pulldown"
    movement_pattern: "pull_vertical"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "biceps"]
      secondary: ["rhomboids", "lower_trapezius"]
    equipment: "cable"
    difficulty: "beginner"
    coaching_cues:
      - "Use a V-bar or close-grip handle on the pulldown"
      - "Pull to upper chest, squeezing lats hard"
      - "Control the eccentric — feel the stretch at the top"
    contraindications:
      - "Shoulder pain during overhead pulling"
    progressions:
      easier: ["Wide-Grip Lat Pulldown"]
      harder: ["Chin-Up"]

  - name: "Assisted Pull-Up (Machine)"
    movement_pattern: "pull_vertical"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "biceps"]
      secondary: ["rhomboids", "lower_trapezius", "forearms"]
    equipment: "machine"
    difficulty: "beginner"
    coaching_cues:
      - "Set counterweight to assist — more weight means more help"
      - "Pull with the same form as a regular pull-up"
      - "Lower with control to full arm extension"
    contraindications:
      - "Shoulder impingement"
    progressions:
      easier: ["Lat Pulldown"]
      harder: ["Band-Assisted Pull-Up", "Pull-Up"]

  - name: "Dumbbell Pullover"
    movement_pattern: "pull_vertical"
    category: "compound"
    muscle_groups:
      primary: ["latissimus_dorsi", "pectoralis_major"]
      secondary: ["triceps_long_head", "serratus_anterior"]
    equipment: "dumbbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Lie across a bench, hips slightly dropped"
      - "Hold dumbbell overhead, lower behind head in an arc"
      - "Pull back to start using lats and chest"
    contraindications:
      - "Shoulder instability"
      - "Thoracic spine stiffness limiting overhead range"
    progressions:
      easier: ["Straight-Arm Pulldown"]
      harder: ["Barbell Pullover"]

  # ============================================================
  # SQUAT / LEG PRESS
  # ============================================================

  - name: "Barbell Back Squat"
    movement_pattern: "squat"
    category: "compound"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus"]
      secondary: ["hamstrings", "adductors", "erector_spinae", "core"]
    equipment: "barbell"
    difficulty: "intermediate"
    coaching_cues:
      - "Bar on upper traps, feet shoulder-width, toes slightly out"
      - "Sit back and down — knees track over toes"
      - "Drive through the whole foot, chest up throughout"
    contraindications:
      - "Acute knee injury (meniscus, ACL)"
      - "Lumbar disc herniation with loaded flexion intolerance"
    progressions:
      easier: ["Goblet Squat", "Leg Press"]
      harder: ["Paused Squat", "Front Squat"]

  - name: "Front Squat"
    movement_pattern: "squat"
    category: "compound"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus"]
      secondary: ["core", "upper_back", "hamstrings"]
    equipment: "barbell"
    difficulty: "advanced"
    coaching_cues:
      - "Bar rests on front delts, elbows high"
      - "Stay upright — torso more vertical than back squat"
      - "Descend to full depth while keeping elbows up"
    contraindications:
      - "Wrist or shoulder mobility limitations"
      - "Knee pain during deep flexion"
    progressions:
      easier: ["Goblet Squat", "Back Squat"]
      harder: ["Pause Front Squat", "Zercher Squat"]

  - name: "Goblet Squat"
    movement_pattern: "squat"
    category: "compound"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus"]
      secondary: ["core", "adductors", "hamstrings"]
    equipment: "dumbbell"
    difficulty: "beginner"
    coaching_cues:
      - "Hold dumbbell or kettlebell at chest height"
      - "Sit down between your knees, elbows inside thighs"
      - "Drive through heels, keep chest tall"
    contraindications:
      - "Acute knee pain during squatting motion"
    progressions:
      easier: ["Bodyweight Squat"]
      harder: ["Front Squat", "Barbell Back Squat"]

  - name: "Bodyweight Squat"
    movement_pattern: "squat"
    category: "compound"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus"]
      secondary: ["hamstrings", "core", "calves"]
    equipment: "bodyweight"
    difficulty: "beginner"
    coaching_cues:
      - "Feet shoulder-width apart, arms extended forward for balance"
      - "Sit hips back and down to at least parallel"
      - "Stand tall at the top, squeezing glutes"
    contraindications:
      - "Acute knee or hip injury"
    progressions:
      easier: ["Box Squat (assisted)", "Wall Sit"]
      harder: ["Goblet Squat", "Jump Squat"]

  - name: "Leg Press"
    movement_pattern: "squat"
    category: "compound"
    muscle_groups:
      primary: ["quadriceps", "gluteus_maximus"]
      secondary: ["hamstrings", "adductors"]
    equipment: "machine"
    difficulty: "beginner"
