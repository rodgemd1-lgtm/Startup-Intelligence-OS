  - id: experiment_registry_protocol
    name: Experiment Registry Protocol
    data_type: operational_protocols
    stage_gates: [blueprint, memory]
    status: active
    path: editorial/FOUNDER_EXPERIMENT_REGISTRY_PROTOCOL.md
