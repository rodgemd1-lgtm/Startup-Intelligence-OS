<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Jake Console — Startup Intelligence OS v5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07090e;
      --surface-1: #0d1017;
      --surface-2: #131821;
      --surface-3: #1a2030;
      --surface-raised: #1e2638;
      --border: #1f2a3c;
      --border-subtle: #161e2c;
      --text: #dfe6f0;
      --text-secondary: #8793a8;
      --text-tertiary: #5c6a82;
      --accent: #5b8def;
      --accent-glow: rgba(91,141,239,0.12);
      --accent-border: rgba(91,141,239,0.3);
      --success: #5cd4a0;
      --success-glow: rgba(92,212,160,0.1);
      --warning: #e8a84c;
      --warning-glow: rgba(232,168,76,0.1);
      --danger: #e06565;
      --danger-glow: rgba(224,101,101,0.1);
      --font: 'Outfit', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.45;
      overflow: hidden;
      height: 100vh;
    }

    /* === LAYOUT === */
    .app {
      display: grid;
      grid-template-columns: 252px 1fr 300px;
      height: 100vh;
    }

    .sidebar {
      background: var(--surface-1);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px 14px;
      animation: slideInLeft 0.5s ease;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(13,16,23,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      flex-shrink: 0;
      animation: fadeIn 0.4s ease;
    }

    .pane {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(91,141,239,0.04), transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(92,212,160,0.03), transparent 60%),
        var(--bg);
    }

    .pane-inner {
      max-width: 1100px;
      display: grid;
      gap: 16px;
      align-content: start;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .pane-inner.exit {
      opacity: 0;
      transform: translateY(6px);
    }

    .rightbar {
      background: var(--surface-1);
      border-left: 1px solid var(--border-subtle);
      padding: 20px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: slideInRight 0.5s ease;
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* === TYPOGRAPHY === */
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
    h2 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
    h3 { font-size: 0.87rem; font-weight: 500; }
    p { color: var(--text-secondary); font-size: 0.87rem; }
    .muted { color: var(--text-secondary); }
    .tertiary { color: var(--text-tertiary); }
    .accent { color: var(--accent); }
    .success { color: var(--success); }
    .warning { color: var(--warning); }
    .danger { color: var(--danger); }
    .mono { font-family: var(--mono); font-size: 0.8rem; }
    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    /* === SIDEBAR === */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px 16px;
    }
    .logo-mark {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #3b6fd4);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #fff;
      box-shadow: 0 0 20px rgba(91,141,239,0.25);
    }
    .logo-text { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.02em; }
    .logo-sub { font-size: 0.7rem; color: var(--text-tertiary); margin-top: 1px; }

    .section-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      padding: 16px 10px 8px;
      font-weight: 500;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.87rem;
      color: var(--text-secondary);
      border: 1px solid transparent;
      transition: all 0.2s ease;
      position: relative;
    }
    .nav-item:hover {
      color: var(--text);
      background: var(--surface-2);
    }
    .nav-item.active {
      color: var(--text);
      background: var(--surface-2);
      border-color: var(--border);
      box-shadow: var(--shadow);
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 16px;
      border-radius: 0 3px 3px 0;
      background: var(--accent);
    }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
      font-family: var(--mono);
    }
    .nav-badge.danger-badge { background: var(--danger-glow); color: var(--danger); }
    .nav-badge.accent-badge { background: var(--accent-glow); color: var(--accent); }

    .workspace-card {
      padding: 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      margin-bottom: 4px;
    }
    .workspace-card:hover { background: var(--surface-2); }
    .workspace-card.active {
      background: var(--surface-2);
      border-color: var(--border);
      box-shadow: var(--shadow);
    }
    .workspace-card .ws-name { font-size: 0.87rem; font-weight: 500; }
    .workspace-card .ws-meta { font-size: 0.72rem; color: var(--text-tertiary); margin-top: 2px; }
    .workspace-card .ws-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .ws-dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .ws-dot.idle { background: var(--text-tertiary); }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 10px;
      border-top: 1px solid var(--border-subtle);
      font-size: 0.72rem;
      color: var(--text-tertiary);
    }

    /* === TOPBAR === */
    .ctx-badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .badge {
      padding: 5px 10px;
      border-radius: 99px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.72rem;
      font-family: var(--mono);
      white-space: nowrap;
    }
    .badge .badge-label { color: var(--text-tertiary); margin-right: 4px; }

    .toolbar { display: flex; gap: 8px; flex-shrink: 0; }
    .btn {
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn:hover { background: var(--surface-3); border-color: var(--accent-border); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #4a78d4);
      border-color: transparent;
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }

    /* === CARDS === */
    .card {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s ease;
    }
    .card:hover { border-color: var(--border); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .card-glow {
      border-color: var(--accent-border);
      box-shadow: var(--shadow), 0 0 30px var(--accent-glow);
    }

    /* === METRICS === */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .metric-card {
      padding: 16px;
      border-radius: var(--radius);
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      position: relative;
      overflow: hidden;
    }
    .metric-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .metric-card.m-accent::after { background: var(--accent); }
    .metric-card.m-warning::after { background: var(--warning); }
    .metric-card.m-success::after { background: var(--success); }
    .metric-card.m-danger::after { background: var(--danger); }
    .metric-label { font-size: 0.75rem; color: var(--text-tertiary); font-weight: 500; }
    .metric-value {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .metric-value.count-up {
      animation: countUp 0.6s ease forwards;
    }

    /* === GRID LAYOUTS === */
    .grid-2 { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }
    .grid-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stack { display: flex; flex-direction: column; gap: 14px; }

    /* === JAKE BRIEF === */
    .jake-msg {
      padding: 16px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--accent-border);
      background: linear-gradient(135deg, rgba(91,141,239,0.06), rgba(91,141,239,0.02));
      line-height: 1.55;
      font-size: 0.87rem;
    }
    .jake-msg .jake-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .jake-msg .jake-label::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease infinite;
    }

    /* === LIST ITEMS === */
    .list-stack { display: flex; flex-direction: column; gap: 8px; }
    .list-item {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    .list-item:hover { border-color: var(--border); }
    .list-item .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .list-item .item-meta { color: var(--text-secondary); font-size: 0.78rem; margin-top: 4px; }

    /* === STATUS TAGS === */
    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .tag-gap { background: var(--danger-glow); color: var(--danger); }
    .tag-partial { background: var(--warning-glow); color: var(--warning); }
    .tag-ok { background: var(--success-glow); color: var(--success); }
    .tag-active { background: var(--accent-glow); color: var(--accent); }
    .tag-draft { background: rgba(140,150,170,0.12); color: var(--text-secondary); }

    /* === PROGRESS BARS === */
    .progress-track {
      height: 6px;
      border-radius: 3px;
      background: var(--surface-3);
      overflow: hidden;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
    }
    .progress-fill.accent { background: linear-gradient(90deg, var(--accent), #7aa3f5); }
    .progress-fill.success { background: linear-gradient(90deg, var(--success), #7ee8b8); }
    .progress-fill.warning { background: linear-gradient(90deg, var(--warning), #f0c070); }
    .progress-fill.danger { background: linear-gradient(90deg, var(--danger), #f08080); }

    /* === MATURITY BAR (special) === */
    .maturity-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
    }
    .maturity-row .domain-name { width: 160px; font-size: 0.82rem; font-weight: 500; flex-shrink: 0; }
    .maturity-row .bar-wrap { flex: 1; }
    .maturity-row .score-label {
      width: 60px; text-align: right; font-family: var(--mono);
      font-size: 0.75rem; color: var(--text-secondary); flex-shrink: 0;
    }
    .maturity-segments {
      display: flex; gap: 2px; height: 8px;
    }
    .maturity-seg {
      flex: 1;
      border-radius: 2px;
      background: var(--surface-3);
      transition: background 0.6s ease;
    }
    .maturity-seg.filled { background: var(--accent); }
    .maturity-seg.filled.warn { background: var(--warning); }
    .maturity-seg.filled.bad { background: var(--danger); }
    .maturity-seg.target {
      background: transparent;
      border: 1px dashed var(--text-tertiary);
    }

    /* === TERMINAL === */
    .terminal {
      background: #060810;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .terminal-header {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.72rem;
      color: var(--text-tertiary);
    }
    .terminal-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .terminal-output {
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: #8ba4cc;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .terminal-input-wrap {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      border-top: 1px solid var(--border-subtle);
      gap: 8px;
    }
    .terminal-prompt { color: var(--accent); font-family: var(--mono); font-size: 0.75rem; }
    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      outline: none;
    }

    /* === SCORING BARS === */
    .score-bar-wrap { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .score-bar-track { flex: 1; height: 10px; border-radius: 5px; background: var(--surface-3); overflow: hidden; }
    .score-bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--accent), #7dbbf7);
      transition: width 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .score-bar-fill.best { background: linear-gradient(90deg, var(--success), #5cd4a0); }
    .score-num {
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 600;
      width: 30px;
      text-align: right;
    }

    /* === AGENT GRID === */
    .agent-card {
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      transition: all 0.2s ease;
      cursor: default;
    }
    .agent-card:hover {
      border-color: var(--accent-border);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .agent-name { font-weight: 500; font-size: 0.82rem; }
    .agent-role { font-size: 0.72rem; color: var(--text-tertiary); margin-top: 3px; }
    .agent-group-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 6px;
    }

    /* === RIGHT RAIL === */
    .next-action-item {
      padding: 11px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid var(--accent);
    }
    .next-action-item:hover {
      background: var(--surface-3);
      border-left-color: var(--success);
    }
    .next-action-item:first-child {
      border-left-color: var(--success);
      animation: softPulse 3s ease infinite;
    }

    .design-rule {
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(232,168,76,0.06);
      border: 1px solid rgba(232,168,76,0.2);
      color: #e8c88c;
      font-size: 0.78rem;
      line-height: 1.5;
    }
    .design-rule strong { color: var(--warning); }

    .system-pulse {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      font-size: 0.78rem;
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s ease infinite;
    }

    /* === DEBATE TABS === */
    .debate-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
    .debate-tab {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }
    .debate-tab.active {
      background: var(--accent-glow);
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .debate-tab:hover { border-color: var(--border); }

    /* === TIMELINE === */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 9px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent), var(--success), var(--warning));
      border-radius: 1px;
    }
    .timeline-item {
      position: relative;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -24px; top: 18px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }
    .timeline-item.current::before {
      box-shadow: 0 0 10px var(--accent);
    }
    .timeline-year {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 600;
    }
    .timeline-title { font-weight: 500; margin-top: 4px; }
    .timeline-desc { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }

    /* === ANIMATIONS === */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 12px var(--success-glow); }
    }
    @keyframes typeIn {
      from { max-height: 0; opacity: 0; }
      to { max-height: 400px; opacity: 1; }
    }
    @keyframes barGrow {

      to { opacity: 1; transform: scale(1); }
    }
    @keyframes borderPulse {
      0%, 100% { border-color: var(--border-subtle); }
      50% { border-color: var(--accent-border); }
    }

    .reveal {
      opacity: 0;
      animation: fadeInUp 0.45s ease forwards;
      animation-delay: var(--d, 0ms);
    }

      align-items: center;
      gap: 4px;
      padding: 3px 8px;

      color: var(--danger);

    }
    .urgency-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--danger);
    }
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.72rem;

    .critical-path {

      position: relative;
    }
    .critical-path::after {
      content: 'CRITICAL PATH';
      position: absolute;
      top: 8px; right: 12px;

      Object.keys(opt.scores).forEach(function(key) {
        html += '<div style="display:flex;align-items:center;gap:8px;margin-top:6px">' +
          '<span class="tertiary" style="width:70px;font-size:0.72rem">' + key + '</span>' +
          '<div class="score-bar-track"><div class="score-bar-fill' + (isBest ? ' best' : '') + ' bar-anim" data-width="' + opt.scores[key] + '"></div></div>' +
          '<span class="mono tertiary" style="width:24px;text-align:right;font-size:0.7rem">' + opt.scores[key] + '</span></div>';
      });
      html += '</div>';
    });
    html += '</div>';

    // Output contract
    html += '<div style="margin-top:14px;padding:12px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border-subtle)">' +
      '<div class="label" style="margin-bottom:6px">Output Contract</div>' +
      '<div style="font-size:0.78rem;color:var(--text-secondary)">recommendation · counter_recommendation · why_now · failure_modes · next_experiment</div></div>';
    html += '</div>';
  });

  html += '<div class="reveal" ' + delay(state.decisions.length + 1) + '>' + renderTerminal() + '</div>';
  return html;
}

// --- CAPABILITY MAP ---
function viewCapabilities() {
  var html = '<h1 class="reveal" ' + delay(0) + ' style="margin-bottom:4px">Capability Map</h1>' +
    '<p class="reveal" ' + delay(0) + '>12 domains scored from the 25X assessment. Current aggregate: <span class="warning">1.6 / 5.0</span>.</p>';

  // Wave summary
  var waves = [0,0,0];
  state.capabilities.forEach(function(c) { waves[c.wave - 1]++; });
  html += '<div class="grid-3 reveal" ' + delay(1) + '>' +
    '<div class="metric-card m-accent"><div class="metric-label">Wave 1 (Foundation)</div><div class="metric-value accent">' + waves[0] + '</div></div>' +
    '<div class="metric-card m-warning"><div class="metric-label">Wave 2 (Scale)</div><div class="metric-value warning">' + waves[1] + '</div></div>' +
    '<div class="metric-card m-success"><div class="metric-label">Wave 3 (Compound)</div><div class="metric-value success">' + waves[2] + '</div></div>' +
    '</div>';

  // Maturity bars
  html += '<div class="card reveal" ' + delay(2) + '>';
  html += '<div class="card-header"><h2>Domain Maturity</h2><div class="label">current / target</div></div>';
  html += '<div class="stack">';
  state.capabilities.forEach(function(c) {
    html += '<div class="maturity-row">' +
      '<div class="domain-name">' + c.name + '</div>' +
      '<div class="bar-wrap"><div class="maturity-segments">';
    for (var i = 1; i <= 5; i++) {
      var filled = i <= Math.round(c.maturity);
      var isTarget = i <= Math.round(c.target) && !filled;
      var colorClass = filled ? (c.maturity < 1.5 ? ' bad' : c.maturity < 2.5 ? ' warn' : '') : '';
      html += '<div class="maturity-seg' + (filled ? ' filled' + colorClass : '') + (isTarget ? ' target' : '') + '"></div>';
    }
    html += '</div></div>' +
      '<div class="score-label">' + c.maturity.toFixed(1) + ' → ' + c.target.toFixed(1) + '</div>' +
      '<span class="tag tag-' + (c.wave === 1 ? 'active' : c.wave === 2 ? 'partial' : 'ok') + '">W' + c.wave + '</span>' +
      '</div>';
  });
  html += '</div></div>';

  // Gaps detail — Wave 1 critical path framing (loss aversion)
  html += '<div class="card reveal" ' + delay(3) + '>';
  html += '<div class="card-header"><h2>Critical Gaps</h2><span class="urgency-badge">Foundation at risk</span></div>';
  html += '<div class="list-stack">';
  state.capabilities.filter(function(c){ return c.gaps.length > 0; }).sort(function(a,b){ return a.wave - b.wave || a.maturity - b.maturity; }).forEach(function(c) {
    var critClass = c.wave === 1 && c.maturity < 2 ? ' critical-path' : '';
    html += '<div class="list-item' + critClass + '"><div class="row"><strong>' + c.name + '</strong><div style="display:flex;gap:6px;align-items:center"><span class="wave-label w' + c.wave + '">W' + c.wave + '</span><span class="tag tag-gap">' + c.gaps.length + ' gaps</span></div></div>' +
      '<div class="item-meta">' + c.gaps.join(' · ') + '</div></div>';
  });
  html += '</div></div>';

  return html;
}

    '</div>';

    '<div class="list-item"><div class="row"><span>Agent team deployment</span><span class="mono">per-company → shared foundry</span></div></div>' +

// =============================================================================
// TERMINAL
// =============================================================================
function renderTerminal() {
  return '<div class="terminal" id="terminal"' + (terminalVisible ? '' : ' style="display:none"') + '>' +
    '<div class="terminal-header">' +
    '<div class="terminal-dot" style="background:#e06565"></div>' +
    '<div class="terminal-dot" style="background:#e8a84c"></div>' +
    '<div class="terminal-dot" style="background:#5cd4a0"></div>' +
    '<span style="margin-left:8px">jake terminal</span></div>' +
    '<div class="terminal-output" id="terminal-output">' + terminalHistory.join('\n') + '</div>' +
    '<div class="terminal-input-wrap">' +
    '<span class="terminal-prompt">$</span>' +
    '<input class="terminal-input" id="terminal-input" placeholder="Type a command..." autocomplete="off" />' +
    '</div></div>';
}

function toggleTerminal() {
  terminalVisible = !terminalVisible;
  var el = document.getElementById('terminal');
  if (el) el.style.display = terminalVisible ? 'block' : 'none';
  if (terminalVisible) {
    var input = document.getElementById('terminal-input');
    if (input) input.focus();
  }
}

var staticCommands = {
  help: 'Available commands:\n  help        Show this message\n  status      System status\n  decisions   Open decisions\n  capabilities  Capability gaps\n  context     Active workspace context\n  clear       Clear terminal\n\nKeyboard shortcuts:\n  1-6   Switch views · t  Toggle terminal',
  status: 'jake: Decision OS status\n  decisions: ' + state.status.decisions + '\n  capabilities: ' + state.status.capabilities + '\n  runs: ' + state.status.runs + '\n  agents: ' + state.agents.length,
  context: 'Startup Intelligence OS Context\n  Company: ' + state.context.active_company + '\n  Project: ' + state.context.active_project + '\n  Decision: ' + state.context.active_decision + '\n  Branch: ' + state.context.active_branch,
};

// Dynamic commands that reference state at execution time
var dynamicCommands = {
  decisions: function() {
    var lines = ['Open decisions (' + state.decisions.length + '):'];
    state.decisions.forEach(function(d, i) {
      var best = d.options.reduce(function(a,b){ return a.total > b.total ? a : b; });
      lines.push('  ' + (i+1) + '. ' + d.title + ' [' + d.status + '] — best: ' + best.title + ' (' + best.total + ')');
    });
    return lines.join('\n');
  },
  capabilities: function() {
    var lines = ['Capability domains (' + state.capabilities.length + '):'];
    state.capabilities.forEach(function(c) {
      var bar = '';
      for (var i = 0; i < 5; i++) bar += i < Math.round(c.maturity) ? '█' : '░';
      lines.push('  ' + bar + '  ' + c.maturity.toFixed(1) + '/' + c.target.toFixed(1) + '  ' + c.name + ' [W' + c.wave + ']');
    });
    return lines.join('\n');
  }
};

function initTerminal() {
  var input = document.getElementById('terminal-input');
  if (!input) return;
  input.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    var cmd = input.value.trim();
    if (!cmd) return;
    input.value = '';
    terminalHistory.push('$ ' + cmd);
    if (cmd === 'clear') { terminalHistory = []; }
    else if (staticCommands[cmd]) { terminalHistory.push(staticCommands[cmd]); }
    else if (dynamicCommands[cmd]) { terminalHistory.push(dynamicCommands[cmd]()); }
    else {
      fetch(API + '/api/' + cmd).then(function(r) { return r.json(); })
        .then(function(data) { terminalHistory.push(JSON.stringify(data, null, 2)); })
        .catch(function() { terminalHistory.push('Unknown command: ' + cmd + '\nType "help" for available commands.'); });
    }
    var output = document.getElementById('terminal-output');
    if (output) {
      output.textContent = terminalHistory.join('\n');
      output.scrollTop = output.scrollHeight;
    }
  });
}

// =============================================================================
// ANIMATED BARS
// =============================================================================
function animateBars() {
  setTimeout(function() {
    var bars = document.querySelectorAll('.bar-anim');
    bars.forEach(function(bar) {
      var w = bar.getAttribute('data-width');
      bar.style.width = w + '%';
    });
  }, 200);
}

// =============================================================================
// API
// =============================================================================
function fetchFromApi() {
  Promise.all([
    fetch(API + '/api/context').then(function(r){ return r.json(); }),
    fetch(API + '/api/status').then(function(r){ return r.json(); }),
    fetch(API + '/api/debrief?operator=mike').then(function(r){ return r.json(); }),
  ]).then(function(results) {
    state.context = results[0];
    state.status = results[1];
    state.debrief = results[2];
    state.debrief.greeting = state.debrief.greeting || getGreeting();
    apiLive = true;
    document.getElementById('system-status').textContent = 'API connected — localhost:8420';
    document.getElementById('sidebar-footer').textContent = 'API: live • ' + state.agents.length + ' agents';
    renderTopbar();
    renderRightRail();
    switchView(currentView);
  }).catch(function() {
    apiLive = false;
    document.getElementById('system-status').textContent = 'Static mode — API offline';
    document.getElementById('sidebar-footer').textContent = 'Static mode • ' + state.agents.length + ' agents';
  });
}

// =============================================================================
// BOOT
// =============================================================================
function boot() {
  renderNav();
  renderTopbar();
  renderRightRail();
  switchView('home');
  terminalVisible = true;
  fetchFromApi();

  // Boot message in terminal
  terminalHistory.push('jake v5 — Startup Intelligence OS');
  terminalHistory.push('Session: ' + new Date().toLocaleString());
  terminalHistory.push('Type "help" for available commands.\n');

  // Keyboard shortcuts for view switching
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    var map = { '1': 'home', '2': 'decisions', '3': 'capabilities', '4': 'innovation', '5': 'agents', '6': 'dashboard' };
    if (map[e.key]) { switchView(map[e.key]); }
    if (e.key === 't' || e.key === '`') { e.preventDefault(); toggleTerminal(); }
  });
}

document.addEventListener('DOMContentLoaded', boot);
</script>
