<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jake Ops Dashboard</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --green: #00ff88;
      --yellow: #ffcc00;
      --red: #ff4444;
      --blue: #4488ff;
      --purple: #aa66ff;
      --muted: #666;
      --text: #e0e0e0;
      --font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .header-title { color: var(--green); font-size: 16px; letter-spacing: 0.05em; }
    .header-meta { color: var(--muted); font-size: 11px; }
    .header-actions { display: flex; gap: 10px; }
    button {
      background: var(--bg3); color: var(--text); border: 1px solid var(--border);
      padding: 4px 10px; cursor: pointer; font-family: var(--font); font-size: 12px;
    }
    button:hover { border-color: var(--green); color: var(--green); }

    /* Grid */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 1px;
      background: var(--border);
      height: calc(100vh - 48px);
      overflow: hidden;
    }
    .panel {
      background: var(--bg2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-full { grid-column: 1 / -1; }
    .panel-half { grid-column: span 1; }

    .panel-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .panel-header h2 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .panel-header .badge {
      font-size: 10px; padding: 1px 6px; border-radius: 3px;
    }
    .badge-ok { background: #003322; color: var(--green); }
    .badge-err { background: #330000; color: var(--red); }
    .badge-warn { background: #332200; color: var(--yellow); }

    .panel-body { flex: 1; overflow-y: auto; padding: 10px 12px; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: var(--bg); }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); }

    /* Loading / Error */
    .loading { color: var(--muted); font-style: italic; }
    .error-msg { color: var(--red); }

    /* Panel 1: Task Board */
    .kanban { display: flex; gap: 10px; height: 100%; }
    .kanban-col { flex: 1; min-width: 120px; }
    .kanban-col h3 { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .task-card {
      background: var(--bg3); border: 1px solid var(--border); padding: 6px 8px;
      margin-bottom: 5px; cursor: pointer;
    }
    .task-card:hover { border-color: var(--blue); }
    .task-title { font-size: 12px; line-height: 1.3; }
    .task-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .priority-high { border-left: 2px solid var(--red); }
    .priority-medium { border-left: 2px solid var(--yellow); }
    .priority-low { border-left: 2px solid var(--blue); }

    /* Panel 2: Brain Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-item {
      background: var(--bg3); border: 1px solid var(--border); padding: 8px 10px;
    }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .stat-value { font-size: 22px; color: var(--green); font-weight: bold; margin-top: 2px; }
    .stat-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .consolidation-time { margin-top: 10px; font-size: 11px; color: var(--muted); }

    /* Panel 3: Activity Log */
    .activity-item {
      display: flex; gap: 8px; margin-bottom: 8px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .activity-time { font-size: 10px; color: var(--muted); min-width: 55px; flex-shrink: 0; }
    .activity-type {
      font-size: 10px; padding: 1px 5px; height: fit-content;
      background: var(--bg3); color: var(--purple); border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .activity-content { font-size: 11px; line-height: 1.4; }

    /* Panel 4: Cron Health */
    .cron-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
      padding: 6px 8px; background: var(--bg3); border: 1px solid var(--border);
    }
    .cron-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cron-ok { background: var(--green); }
    .cron-err { background: var(--red); }
    .cron-unknown { background: var(--muted); }
    .cron-name { flex: 1; font-size: 12px; }
    .cron-time { font-size: 10px; color: var(--muted); }

    /* Panel 5: Goals */
    .goal-item { margin-bottom: 10px; }
    .goal-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .goal-title { font-size: 12px; }
    .goal-pct { font-size: 11px; color: var(--green); }
    .progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); transition: width 0.3s; }
    .goal-deadline { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* Panel 6: Pipeline Runs */
    .pipeline-row { margin-bottom: 8px; padding: 6px 8px; background: var(--bg3); border: 1px solid var(--border); }
    .pipeline-name { font-size: 12px; }
    .pipeline-meta { font-size: 10px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; }
    .pipeline-phase { color: var(--blue); }
    .pipeline-status-running { color: var(--yellow); }
    .pipeline-status-completed { color: var(--green); }
    .pipeline-status-failed { color: var(--red); }
    .pipeline-status-blocked { color: var(--red); font-weight: bold; }

    /* Empty state */
    .empty { color: var(--muted); font-size: 11px; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">⚡ Jake Ops Dashboard</span>
    <span class="header-meta" id="last-refresh">Loading...</span>
    <div class="header-actions">
      <button onclick="refreshAll()">↻ Refresh</button>
      <a href="index.html"><button>← Console</button></a>
    </div>
  </div>

  <div class="dashboard">
    <!-- Row 1: Task Board (full width) -->
    <div class="panel panel-full" id="panel-tasks">
      <div class="panel-header">
        <h2>📋 Task Board</h2>
        <span class="badge badge-ok" id="tasks-badge">—</span>
      </div>
      <div class="panel-body">
        <div class="loading">Loading tasks...</div>
      </div>
    </div>

    <!-- Row 2: Brain Stats + Activity Log + Cron Health -->
    <div class="panel panel-half" id="panel-brain">
      <div class="panel-header">
        <h2>🧠 Brain Stats</h2>
        <span class="badge badge-ok" id="brain-badge">—</span>
      </div>
      <div class="panel-body">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <div class="panel panel-half" id="panel-activity">
      <div class="panel-header">
        <h2>📡 Agent Activity (24h)</h2>
        <span class="badge badge-ok" id="activity-badge">—</span>
      </div>
      <div class="panel-body">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <div class="panel panel-half" id="panel-cron">
      <div class="panel-header">
        <h2>⏱ Cron Health</h2>
        <span class="badge badge-ok" id="cron-badge">—</span>
      </div>
      <div class="panel-body">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <!-- Row 3: Goals + Pipeline Runs -->
    <div class="panel" style="grid-column: span 2" id="panel-goals">
      <div class="panel-header">
        <h2>🎯 Goals Tracker</h2>
        <span class="badge badge-ok" id="goals-badge">—</span>
      </div>
      <div class="panel-body">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <div class="panel panel-half" id="panel-pipeline">
      <div class="panel-header">
        <h2>🔄 Pipeline Runs</h2>
        <span class="badge" id="pipeline-badge">—</span>
      </div>
      <div class="panel-body">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script src="./supabase-client.js"></script>
  <script src="./ops-dashboard.js"></script>
</body>
</html>
