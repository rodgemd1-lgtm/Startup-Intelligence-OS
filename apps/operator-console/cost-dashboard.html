<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperclip — Intelligence OS Cost Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📎</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { color: #737373; font-size: 14px; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card {
            background: #171717;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 20px;
        }
        .card-label { font-size: 12px; color: #737373; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card-value { font-size: 32px; font-weight: 700; }
        .card-value.green { color: #22c55e; }
        .card-value.red { color: #ef4444; }
        .card-value.blue { color: #3b82f6; }
        .card-value.yellow { color: #eab308; }
        .card-detail { font-size: 13px; color: #a3a3a3; margin-top: 4px; }

        .tier-bar {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
        .tier-label { width: 100px; font-size: 13px; color: #a3a3a3; text-align: right; }
        .tier-fill { height: 24px; border-radius: 4px; min-width: 2px; transition: width 0.3s; }
        .tier-count { font-size: 13px; color: #737373; min-width: 60px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #262626; font-size: 13px; }
        th { color: #737373; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
        td.mono { font-family: 'SF Mono', monospace; }
        tr:hover { background: #1a1a1a; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-free { background: #052e16; color: #22c55e; }
        .badge-volume { background: #172554; color: #60a5fa; }
        .badge-smart { background: #422006; color: #f59e0b; }
        .badge-fallback { background: #450a0a; color: #f87171; }
        .badge-anthropic { background: #3b0764; color: #c084fc; }

        .refresh-btn {
            background: #262626;
            color: #e5e5e5;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
        }
        .refresh-btn:hover { background: #333; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-size: 18px; font-weight: 600; margin: 24px 0 12px; }
        .savings-highlight {
            background: linear-gradient(135deg, #052e16 0%, #14532d 100%);
            border: 1px solid #166534;
        }
        #loading { text-align: center; padding: 40px; color: #737373; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-dot.live { background: #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>V1.5 Cost Dashboard</h1>
            <div class="subtitle"><span class="status-dot live"></span>Live — Intelligence OS Agent Spend</div>
        </div>
        <div>
            <button class="refresh-btn" onclick="loadData()">Refresh</button>
            <span id="last-updated" style="font-size: 12px; color: #525252; margin-left: 8px;"></span>
        </div>
    </div>

    <div id="loading">Loading agent cost data...</div>
    <div id="dashboard" style="display:none;">
        <!-- Summary Cards -->
        <div class="grid" id="summary-cards"></div>

        <!-- Tier Distribution -->
        <div class="section-title">Model Tier Distribution</div>
        <div class="card" id="tier-chart"></div>

        <!-- Recent Runs -->
        <div class="section-title">Recent Agent Runs</div>
        <div class="card" style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Agent</th>
                        <th>Model</th>
                        <th>Tier</th>
                        <th>Tokens</th>
                        <th>Cost</th>
                        <th>Duration</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="runs-table"></tbody>
            </table>
        </div>

        <!-- Top Spenders -->
        <div class="section-title">Top Agent Spenders (30 days)</div>
        <div class="card" style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Agent</th>
                        <th>Runs</th>
                        <th>Total Cost</th>
                        <th>Avg Cost/Run</th>
                        <th>Total Tokens</th>
                    </tr>
                </thead>
                <tbody id="spenders-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Supabase config — reads from env or uses defaults
        // Paperclip connects to local proxy that reads Supabase credentials from vault
        const API_BASE = window.location.origin;

        // Pricing reference
        const SONNET_COST_PER_1M_IN = 3.0;
        const SONNET_COST_PER_1M_OUT = 15.0;

        const TIER_COLORS = {
            free_bulk: '#22c55e',
            volume_ops: '#3b82f6',
            smart_ops: '#f59e0b',
            fallback: '#ef4444',
            sonnet: '#a855f7',
            haiku: '#6366f1',
            opus: '#ec4899',
        };
        const TIER_BADGES = {
            free_bulk: 'badge-free',
            volume_ops: 'badge-volume',
            smart_ops: 'badge-smart',
            fallback: 'badge-fallback',
            sonnet: 'badge-anthropic',
            haiku: 'badge-anthropic',
            opus: 'badge-anthropic',
        };

        async function supabaseQuery(table, params = {}) {
            const url = new URL(`${API_BASE}/api/${table}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            const resp = await fetch(url);
            const data = await resp.json();
            return { data, count: data.length };
        }

        async function loadData() {
            try {
                // Fetch recent runs (last 100)
                const { data: runs } = await supabaseQuery('agent_runs', {
                    select: '*',
                    order: 'created_at.desc',
                    limit: '100',
                });

                // Fetch 30-day aggregates
                const thirtyDaysAgo = new Date(Date.now() - 30 * 86400000).toISOString();
                const { data: allRuns } = await supabaseQuery('agent_runs', {
                    select: 'agent_id,model,cost_usd,input_tokens,output_tokens,duration_ms,created_at',
                    'created_at': `gte.${thirtyDaysAgo}`,
                    limit: '10000',
                });

                renderDashboard(runs, allRuns);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('last-updated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                document.getElementById('loading').innerHTML = `
                    <div style="color: #ef4444;">Error loading data: ${e.message}</div>
                    <div style="color: #737373; margin-top: 8px;">
                        Add your Supabase anon key: ?key=YOUR_KEY
                    </div>`;
            }
        }

        function renderDashboard(recentRuns, allRuns) {
            // Calculate metrics
            const totalCost30d = allRuns.reduce((s, r) => s + (r.cost_usd || 0), 0);
            const totalRuns30d = allRuns.length;
            const totalTokens30d = allRuns.reduce((s, r) => s + (r.input_tokens || 0) + (r.output_tokens || 0), 0);

            // Estimate what it would have cost on Sonnet
            const sonnetCost30d = allRuns.reduce((s, r) => {
                return s + (r.input_tokens || 0) * SONNET_COST_PER_1M_IN / 1e6
                         + (r.output_tokens || 0) * SONNET_COST_PER_1M_OUT / 1e6;
            }, 0);
            const savings = sonnetCost30d - totalCost30d;
            const savingsPct = sonnetCost30d > 0 ? (savings / sonnetCost30d * 100) : 0;

            // Count by provider
            const openrouterRuns = allRuns.filter(r => !r.model?.startsWith('claude-'));
            const anthropicRuns = allRuns.filter(r => r.model?.startsWith('claude-'));
            const openrouterPct = totalRuns30d > 0 ? (openrouterRuns.length / totalRuns30d * 100) : 0;

            // Summary cards
            document.getElementById('summary-cards').innerHTML = `
                <div class="card savings-highlight">
                    <div class="card-label">30-Day Savings vs Sonnet</div>
                    <div class="card-value green">$${savings.toFixed(2)}</div>
                    <div class="card-detail">${savingsPct.toFixed(1)}% saved — would have been $${sonnetCost30d.toFixed(2)} on Sonnet</div>
                </div>
                <div class="card">
                    <div class="card-label">30-Day Actual Spend</div>
                    <div class="card-value blue">$${totalCost30d.toFixed(4)}</div>
                    <div class="card-detail">${totalRuns30d.toLocaleString()} runs / ${(totalTokens30d / 1e6).toFixed(2)}M tokens</div>
                </div>
                <div class="card">
                    <div class="card-label">OpenRouter Adoption</div>
                    <div class="card-value ${openrouterPct > 80 ? 'green' : 'yellow'}">${openrouterPct.toFixed(0)}%</div>
                    <div class="card-detail">${openrouterRuns.length} OpenRouter / ${anthropicRuns.length} Anthropic</div>
                </div>
                <div class="card">
                    <div class="card-label">Avg Cost Per Run</div>
                    <div class="card-value">$${totalRuns30d > 0 ? (totalCost30d / totalRuns30d).toFixed(5) : '0'}</div>
                    <div class="card-detail">Target: < $0.001 (was ~$0.02 on Sonnet)</div>
                </div>
            `;

            // Tier distribution
            const tierCounts = {};
            allRuns.forEach(r => {
                const model = r.model || 'unknown';
                let tier = 'unknown';
                if (model.includes('gemini')) tier = 'volume_ops';
                else if (model.includes('deepseek')) tier = 'smart_ops';
                else if (model.includes('glm') && model.includes('free')) tier = 'free_bulk';
                else if (model.includes('glm')) tier = 'smart_ops';
                else if (model.includes('gpt-4o')) tier = 'fallback';
                else if (model.includes('sonnet')) tier = 'sonnet';
                else if (model.includes('haiku')) tier = 'haiku';
                else if (model.includes('opus')) tier = 'opus';
                else tier = 'volume_ops';
                tierCounts[tier] = (tierCounts[tier] || 0) + 1;
            });

            const maxCount = Math.max(...Object.values(tierCounts), 1);
            let tierHTML = '';
            for (const [tier, count] of Object.entries(tierCounts).sort((a, b) => b[1] - a[1])) {
                const pct = (count / maxCount * 100).toFixed(0);
                const color = TIER_COLORS[tier] || '#525252';
                tierHTML += `
                    <div class="tier-bar">
                        <div class="tier-label">${tier}</div>
                        <div class="tier-fill" style="width: ${pct}%; background: ${color};"></div>
                        <div class="tier-count">${count} runs</div>
                    </div>`;
            }
            document.getElementById('tier-chart').innerHTML = tierHTML || '<div style="color:#737373;padding:12px;">No data yet</div>';

            // Recent runs table
            const tbody = document.getElementById('runs-table');
            tbody.innerHTML = recentRuns.slice(0, 50).map(r => {
                const model = r.model || '?';
                let tier = 'unknown';
                if (model.includes('gemini')) tier = 'volume_ops';
                else if (model.includes('deepseek')) tier = 'smart_ops';
                else if (model.includes('glm') && model.includes('free')) tier = 'free_bulk';
                else if (model.includes('gpt-4o')) tier = 'fallback';
                else if (model.includes('claude')) tier = model.includes('haiku') ? 'haiku' : model.includes('opus') ? 'opus' : 'sonnet';
                const badge = TIER_BADGES[tier] || '';
                const time = r.created_at ? new Date(r.created_at).toLocaleString() : '?';
                return `<tr>
                    <td>${r.agent_id || '?'}</td>
                    <td class="mono" style="font-size:11px;">${model}</td>
                    <td><span class="badge ${badge}">${tier}</span></td>
                    <td class="mono">${((r.input_tokens||0)+(r.output_tokens||0)).toLocaleString()}</td>
                    <td class="mono">$${(r.cost_usd||0).toFixed(5)}</td>
                    <td class="mono">${r.duration_ms ? (r.duration_ms/1000).toFixed(1)+'s' : '?'}</td>
                    <td style="font-size:11px;color:#737373;">${time}</td>
                </tr>`;
            }).join('');

            // Top spenders
            const agentSpend = {};
            allRuns.forEach(r => {
                const aid = r.agent_id || 'unknown';
                if (!agentSpend[aid]) agentSpend[aid] = { runs: 0, cost: 0, tokens: 0 };
                agentSpend[aid].runs++;
                agentSpend[aid].cost += r.cost_usd || 0;
                agentSpend[aid].tokens += (r.input_tokens || 0) + (r.output_tokens || 0);
            });
            const sorted = Object.entries(agentSpend).sort((a, b) => b[1].cost - a[1].cost);
            document.getElementById('spenders-table').innerHTML = sorted.slice(0, 20).map(([aid, d]) => `
                <tr>
                    <td>${aid}</td>
                    <td class="mono">${d.runs}</td>
                    <td class="mono">$${d.cost.toFixed(4)}</td>
                    <td class="mono">$${(d.cost / d.runs).toFixed(5)}</td>
                    <td class="mono">${(d.tokens / 1e3).toFixed(1)}K</td>
                </tr>`).join('');
        }

        // Auto-refresh every 60 seconds
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
