name: IOSDeviceProbe

options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 3343A3GQAT
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0

targets:
  DeviceProbe:
    type: application
    platform: iOS
    sources:
      - path: DeviceProbe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: os.startupintelligence.deviceprobe
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: DeviceProbe
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    scheme:
      gatherCoverageData: false
      testTargets:
        - DeviceProbeUITests

  DeviceProbeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DeviceProbeUITests
    dependencies:
      - target: DeviceProbe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: os.startupintelligence.deviceprobe.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DeviceProbe
