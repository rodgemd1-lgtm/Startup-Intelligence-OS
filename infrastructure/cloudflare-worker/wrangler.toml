name = "jake-gateway"
main = "src/index.ts"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
JAKE_VERSION = "v20"
SUSAN_CLOUD_URL = "https://susan-cloud-brain.fly.dev"
# Secrets (set via `wrangler secret put`):
#   SUPERMEMORY_API_KEY
#   SUPABASE_URL
#   SUPABASE_ANON_KEY

# R2 bucket for Jake's persistent state (conversations, artifacts)
[[r2_buckets]]
binding = "JAKE_STATE"
bucket_name = "jake-state"

# KV namespace for hot cache (recent context, session data)
[[kv_namespaces]]
binding = "JAKE_CACHE"
id = "c343a11aef1e45d98c7da92720b54d5f"

[[d1_databases]]
binding = "DB"
database_name = "jake-ops"
database_id = "0897dcd9-9984-423f-a5bc-bedfa00aa196"
migrations_dir = "migrations"

[ai]
binding = "AI"

[observability]
enabled = true
